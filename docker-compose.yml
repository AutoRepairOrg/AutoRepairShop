services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autorepairshop-sql
    environment:
      SA_PASSWORD: "StrongPassword@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '>/dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ./src               
      dockerfile: AutoRepairShop.Api/Dockerfile
    container_name: autorepairshop-api
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development