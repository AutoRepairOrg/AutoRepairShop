services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autorepairshop-sql
    environment:
      SA_PASSWORD: ${DB_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '>/dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ./src
      dockerfile: AutoRepairShop.Api/Dockerfile
    container_name: autorepairshop-api
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;
        Database=AutoRepairShopDb;
        User Id=sa;
        Password=${DB_PASSWORD};
        TrustServerCertificate=True

      JWT__KEY: ${JWT_KEY}
      JWT__ISSUER: ${JWT_ISSUER}
      JWT__AUDIENCE: ${JWT_AUDIENCE}
      JWT__EXPIRESINMINUTES: ${JWT_EXPIRES_IN_MINUTES}