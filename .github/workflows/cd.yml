name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  packages: write

env:
  K8S_NAMESPACE: oficina
  IMAGE_NAME: autorepairshop-api

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - minikube
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AutoRepairShop.sln

      - name: Build
        run: dotnet build AutoRepairShop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AutoRepairShop.sln --configuration Release --no-build --verbosity normal

      - name: Set image metadata
        id: image-meta
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LOWER}/${IMAGE_NAME}:${GITHUB_SHA}"
          echo "owner_lower=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/AutoRepairShop.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.image-meta.outputs.image }}
            ghcr.io/${{ steps.image-meta.outputs.owner_lower }}/${{ env.IMAGE_NAME }}:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4.0.0

      - name: Ensure minikube is running
        run: |
          minikube status || minikube start --driver=docker

      - name: Select minikube context
        run: |
          kubectl config use-context minikube
          kubectl cluster-info
          kubectl get nodes

      - name: Ensure namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create image pull secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --docker-email="ci@local" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create SQL Server secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic sqlserver-secret \
            --from-literal=SA_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=DB_NAME="AutoRepairShopDb" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create API secrets
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic api-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Jwt__Issuer="${{ secrets.JWT_ISSUER }}" \
            --from-literal=Jwt__Audience="${{ secrets.JWT_AUDIENCE }}" \
            --from-literal=Jwt__ExpiresInMinutes="${{ secrets.JWT_EXPIRES_IN_MINUTES }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy database manifests
        run: |
          kubectl apply -f k8s/sqlserver-service.yaml
          kubectl apply -f k8s/sqlserver-deployment.yaml
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/sqlserver --timeout=240s

      - name: Deploy API manifests
        run: |
          kubectl apply -f k8s/api-configmap.yaml
          kubectl apply -f k8s/api-service.yaml
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/api-hpa.yaml

      - name: Update API image
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/api api="${{ steps.image-meta.outputs.image }}"
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/api --timeout=300s
