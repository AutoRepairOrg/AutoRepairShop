name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - development
      - master

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: autorepairshop-api

jobs:
  validate:
    runs-on:
      - self-hosted
      - linux
      - x64
      - minikube

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ${{ runner.temp }}/.dotnet
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AutoRepairShop.sln

      - name: Build
        run: dotnet build AutoRepairShop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AutoRepairShop.sln --configuration Release --no-build --verbosity normal

  publish-image:
    needs: validate
    runs-on:
      - self-hosted
      - linux
      - x64
      - minikube
    outputs:
      owner_lower: ${{ steps.image-meta.outputs.owner_lower }}
      image: ${{ steps.image-meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: image-meta
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LOWER}/${IMAGE_NAME}:${GITHUB_SHA}"
          echo "owner_lower=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/AutoRepairShop.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.image-meta.outputs.image }}
            ghcr.io/${{ steps.image-meta.outputs.owner_lower }}/${{ env.IMAGE_NAME }}:latest

  deploy-development:
    if: github.ref == 'refs/heads/development'
    needs: publish-image
    runs-on:
      - self-hosted
      - linux
      - x64
      - minikube
    environment: development
    env:
      K8S_NAMESPACE: oficina
      MINIKUBE_PROFILE: dev
      TF_VAR_environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Ensure minikube dev cluster
        run: |
          if ! minikube status --profile "${MINIKUBE_PROFILE}" >/dev/null 2>&1; then
            minikube start --profile "${MINIKUBE_PROFILE}" --driver=docker
          fi
          kubectl config use-context "${MINIKUBE_PROFILE}"
          kubectl cluster-info
          kubectl get nodes

      - name: Create image pull secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --docker-email="ci@local" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create SQL Server secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic sqlserver-secret \
            --from-literal=SA_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=DB_NAME="AutoRepairShopDb" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create API secrets
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic api-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Jwt__Issuer="${{ secrets.JWT_ISSUER }}" \
            --from-literal=Jwt__Audience="${{ secrets.JWT_AUDIENCE }}" \
            --from-literal=Jwt__ExpiresInMinutes="${{ secrets.JWT_EXPIRES_IN_MINUTES }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Terraform Init
        run: cd infra && terraform init

      - name: Terraform Plan
        run: cd infra && terraform plan -out=tfplan

      - name: Terraform Apply
        run: cd infra && terraform apply -auto-approve tfplan

      - name: Update API image
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/api api="${{ needs.publish-image.outputs.image }}"

      - name: Wait for deployments
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/sqlserver --timeout=240s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/api --timeout=300s

  deploy-production:
    if: github.ref == 'refs/heads/master'
    needs: publish-image
    runs-on:
      - self-hosted
      - linux
      - x64
      - minikube
    environment: production
    env:
      K8S_NAMESPACE: oficina
      MINIKUBE_PROFILE: prod
      TF_VAR_environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Ensure minikube prod cluster
        run: |
          if ! minikube status --profile "${MINIKUBE_PROFILE}" >/dev/null 2>&1; then
            minikube start --profile "${MINIKUBE_PROFILE}" --driver=docker
          fi
          kubectl config use-context "${MINIKUBE_PROFILE}"
          kubectl cluster-info
          kubectl get nodes

      - name: Create image pull secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --docker-email="ci@local" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create SQL Server secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic sqlserver-secret \
            --from-literal=SA_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=DB_NAME="AutoRepairShopDb" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create API secrets
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic api-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Jwt__Issuer="${{ secrets.JWT_ISSUER }}" \
            --from-literal=Jwt__Audience="${{ secrets.JWT_AUDIENCE }}" \
            --from-literal=Jwt__ExpiresInMinutes="${{ secrets.JWT_EXPIRES_IN_MINUTES }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Terraform Init
        run: cd infra && terraform init

      - name: Terraform Plan
        run: cd infra && terraform plan -out=tfplan

      - name: Terraform Apply
        run: cd infra && terraform apply -auto-approve tfplan

      - name: Update API image
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/api api="${{ needs.publish-image.outputs.image }}"

      - name: Wait for deployments
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/sqlserver --timeout=240s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/api --timeout=300s
