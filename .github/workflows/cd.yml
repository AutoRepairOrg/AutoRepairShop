name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: autorepairshop-api

jobs:
  validate:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'development' || github.event.workflow_run.head_branch == 'master') }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - minikube

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ${{ runner.temp }}/.dotnet
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AutoRepairShop.sln

      - name: Build
        run: dotnet build AutoRepairShop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AutoRepairShop.sln --configuration Release --no-build --verbosity normal

  publish-image:
    needs: validate
    runs-on:
      - self-hosted
      - linux
      - x64
      - minikube
    outputs:
      owner_lower: ${{ steps.image-meta.outputs.owner_lower }}
      image: ${{ steps.image-meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image metadata
        id: image-meta
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LOWER}/${IMAGE_NAME}:${{ github.event.workflow_run.head_sha }}"
          echo "owner_lower=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/AutoRepairShop.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.image-meta.outputs.image }}
            ghcr.io/${{ steps.image-meta.outputs.owner_lower }}/${{ env.IMAGE_NAME }}:latest

  deploy-development:
    if: github.event.workflow_run.head_branch == 'development'
    needs: publish-image
    runs-on:
      - self-hosted
      - linux
      - x64
      - minikube
    environment: development
    env:
      K8S_NAMESPACE: oficina
      MINIKUBE_PROFILE: dev
      TF_VAR_environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Ensure minikube dev cluster
        run: |
          if ! minikube status --profile "${MINIKUBE_PROFILE}" >/dev/null 2>&1; then
            minikube start --profile "${MINIKUBE_PROFILE}" --driver=docker
          fi
          kubectl config use-context "${MINIKUBE_PROFILE}"
          kubectl cluster-info
          kubectl get nodes

      - name: Create image pull secret
        run: |
          if ! kubectl get namespace "${K8S_NAMESPACE}" >/dev/null 2>&1; then
            kubectl create namespace "${K8S_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          fi
          kubectl -n "${K8S_NAMESPACE}" create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ secrets.GHCR_USERNAME }}" \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --docker-email="${{ secrets.GHCR_EMAIL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # moved creation of k8s application secrets to after Terraform apply

      - name: Terraform Init
        run: cd infra && terraform init

      - name: Fix provider permissions
        run: |
          if [ -d infra/.terraform ]; then
            find infra/.terraform -type f -name 'terraform-provider-*' -exec chmod +x {} \; || true
          fi
      - name: Terraform Plan
        run: cd infra && terraform plan -out=tfplan

      - name: Terraform Apply
        run: cd infra && terraform apply -auto-approve tfplan

      - name: Ensure sqlserver-secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic sqlserver-secret \
            --from-literal=SA_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=DB_NAME="AutoRepairShopDb" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure api-secrets
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic api-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Jwt__Issuer="${{ secrets.JWT_ISSUER }}" \
            --from-literal=Jwt__Audience="${{ secrets.JWT_AUDIENCE }}" \
            --from-literal=Jwt__ExpiresInMinutes="${{ secrets.JWT_EXPIRES_IN_MINUTES }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create dev-suffixed workloads
        run: |
          kubectl -n "${K8S_NAMESPACE}" apply -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: api-dev
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: api-dev
            template:
              metadata:
                labels:
                  app: api-dev
              spec:
                imagePullSecrets:
                  - name: ghcr-secret
                containers:
                  - name: api
                    image: ghcr.io/autorepairorg/autorepairshop-api:latest
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "128Mi"
                      limits:
                        cpu: "500m"
                        memory: "256Mi"
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 8080
                    envFrom:
                      - configMapRef:
                          name: api-config
                      - secretRef:
                          name: sqlserver-secret
                      - secretRef:
                          name: api-secrets
          EOF

          kubectl -n "${K8S_NAMESPACE}" apply -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: sqlserver-dev
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: sqlserver-dev
            template:
              metadata:
                labels:
                  app: sqlserver-dev
              spec:
                containers:
                  - name: sqlserver
                    image: mcr.microsoft.com/mssql/server:2022-latest
                    ports:
                      - containerPort: 1433
                    env:
                      - name: ACCEPT_EULA
                        value: "Y"
                      - name: SA_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: sqlserver-secret
                            key: SA_PASSWORD
          EOF

          kubectl -n "${K8S_NAMESPACE}" patch service api --type merge -p '{"spec":{"selector":{"app":"api-dev"}}}'
          kubectl -n "${K8S_NAMESPACE}" patch service sqlserver --type merge -p '{"spec":{"selector":{"app":"sqlserver-dev"}}}'
          kubectl -n "${K8S_NAMESPACE}" patch hpa api-hpa --type merge -p '{"spec":{"scaleTargetRef":{"name":"api-dev"}}}'
          kubectl -n "${K8S_NAMESPACE}" delete deployment api sqlserver --ignore-not-found=true
      - name: Update API image
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/api-dev api="${{ needs.publish-image.outputs.image }}"

      - name: Wait for deployments
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/sqlserver-dev --timeout=60s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/api-dev --timeout=60s

  deploy-production:
    if: github.event.workflow_run.head_branch == 'master'
    needs: publish-image
    runs-on:
      - self-hosted
      - linux
      - x64
      - minikube
    environment: production
    env:
      K8S_NAMESPACE: oficina
      MINIKUBE_PROFILE: prod
      TF_VAR_environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Ensure minikube prod cluster
        run: |
          if ! minikube status --profile "${MINIKUBE_PROFILE}" >/dev/null 2>&1; then
            minikube start --profile "${MINIKUBE_PROFILE}" --driver=docker
          fi
          kubectl config use-context "${MINIKUBE_PROFILE}"
          kubectl cluster-info
          kubectl get nodes

      - name: Create image pull secret
        run: |
          if ! kubectl get namespace "${K8S_NAMESPACE}" >/dev/null 2>&1; then
            kubectl create namespace "${K8S_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          fi
          kubectl -n "${K8S_NAMESPACE}" create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ secrets.GHCR_USERNAME }}" \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --docker-email="${{ secrets.GHCR_EMAIL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # moved creation of k8s application secrets to after Terraform apply
      - name: Terraform Init
        run: cd infra && terraform init

      - name: Fix provider permissions
        run: |
          if [ -d infra/.terraform ]; then
            find infra/.terraform -type f -name 'terraform-provider-*' -exec chmod +x {} \; || true
          fi
      - name: Terraform Plan
        run: cd infra && terraform plan -out=tfplan

      - name: Terraform Apply
        run: cd infra && terraform apply -auto-approve tfplan

      - name: Create SQL Server secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic sqlserver-secret \
            --from-literal=SA_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=DB_NAME="AutoRepairShopDb" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure api-secrets
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic api-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Jwt__Issuer="${{ secrets.JWT_ISSUER }}" \
            --from-literal=Jwt__Audience="${{ secrets.JWT_AUDIENCE }}" \
            --from-literal=Jwt__ExpiresInMinutes="${{ secrets.JWT_EXPIRES_IN_MINUTES }}" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Update API image
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/api api="${{ needs.publish-image.outputs.image }}"

      - name: Wait for deployments
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/sqlserver --timeout=60s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/api --timeout=60s
