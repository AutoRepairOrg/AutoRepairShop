name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AutoRepairShop.sln

      - name: Build
        run: dotnet build AutoRepairShop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AutoRepairShop.sln --configuration Release --no-build --verbosity normal
