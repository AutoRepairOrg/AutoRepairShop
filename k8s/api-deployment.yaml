apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: oficina
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret   
      containers:
        - name: api
          image: ghcr.io/dhiuliaantunes/autorepairshop-api:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: sqlserver-secret
            - secretRef:
                name: api-secrets